<!DOCTYPE html>  
<html lang="pt">  
<head>  
    <meta charset="UTF-8">  
    <title>Calculadora</title>  
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <input type="text" id="visor" readonly>
    <br>

    <button onclick="escrever('1')">1</button>
    <button onclick="escrever('2')">2</button>
    <button onclick="escrever('3')">3</button>
    <button onclick="escrever('4')">4</button>
    <button onclick="escrever('5')">5</button>
    <button onclick="escrever('6')">6</button>
    <button onclick="escrever('7')">7</button>
    <button onclick="escrever('8')">8</button>
    <button onclick="escrever('9')">9</button>
    <button onclick="escrever('0')">0</button>
    <button onclick="calcular()">=</button>
    <button onclick="escrever('+')">+</button>
    <button onclick="escrever('-')">-</button>
    <button onclick="escrever('/')">/ </button>
    <button onclick="escrever('*')">x</button>
    <button onclick="limpar()">C</button>

    <script src="script.js"></script>

</body>
</html>
